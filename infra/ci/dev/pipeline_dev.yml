resources:
  # resource for triggering pipeline; read-only
  - name: repo-read
    type: git
    icon: github
    source:
      uri: ((repo))
      branch: ((branch))
      username: ((git.username))
      password: ((git.password))
      # determines what files trigger the pipeline, replace with "ignore_paths" if more files need to trigger
      paths:
        - ((project_root))  # remove if no project root directory
        - Dockerfile
        - requirements.txt
  
  # resource for writing to repository; write-only to avoid retriggering pipeline
  - name: bump-repo
    type: git
    icon: github
    source:
      uri: ((repo))
      branch: ((branch))
      username: ((git.username))
      password: ((git.password))
  
  # resource of where to push image
  - name: registry
    type: registry-image
    source:
      repository: ((harbor.repository))/((image))
      username: ((harbor.username))
      password: ((harbor.password))
  
  # resource for versioning
  - name: version
    type: semver
    icon: numeric
    source:
      driver: git
      uri: ((ssh_url))
      branch: ((branch))
      private_key: ((git.private_key))
      file: version


jobs:
  - name: build-and-push-image
    plan:
      - get: repo-read
        trigger: true
      - task: build-task-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: repo-read
          outputs:
            - name: image
            - name: repo-read
          params:
            CONTEXT: repo-read
          run:
            path: build
      - get: version
        params:
          bump: patch
      - load_var: version_num
        file: version/version
      - put: registry
        params:
          image: image/image.tar
          version: ((.:version_num))
          bump_aliases: true
      - get: bump-repo
      - task: bump-with-yq
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: docker.io/mikefarah/yq
          inputs:
            - name: bump-repo
          outputs:
            - name: bump-repo
          run:
            path: sh
            args:
              - -exc
              - |
                cd bump-repo
                yq -i '.spec.template.spec.containers[0].image = "((harbor.repository))/((image)):((.:version_num))"' ((manifest_path))
            user: root
      - task: git-commit-bump
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: docker.io/alpine/git
          inputs:
            - name: bump-repo
          outputs:
            - name: bump-repo
          run:
            path: sh
            args:
              - -exc
              - |
                cd bump-repo
                git config --global user.email '<>'
                git config --global user.name "Concourse Bot"
                git add ((manifest_path))
                git commit -m 'bump to ((.:version_num))'
      - put: bump-repo
        params:
          repository: bump-repo
      - put: version
        params:
          file: version/version
